name: netpack

services:
  postgres:
    image: postgres:16-alpine
    container_name: netpack-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-netpack}
      POSTGRES_USER: ${POSTGRES_USER:-netpack}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-netpack_dev_password}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - netpack

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.3
    container_name: netpack-elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: ${ES_JAVA_OPTS:--Xms512m -Xmx512m}
    ports:
      - "127.0.0.1:${ELASTICSEARCH_PORT:-9200}:9200"
      - "127.0.0.1:${ELASTICSEARCH_TRANSPORT_PORT:-9300}:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://localhost:9200/_cluster/health?wait_for_status=yellow\\&timeout=5s >/dev/null"
        ]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - netpack

  minio:
    image: minio/minio:RELEASE.2024-07-16T23-46-41Z
    container_name: netpack-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-netpack}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-netpack_dev_password}
    ports:
      - "127.0.0.1:${MINIO_API_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - netpack

  minio-init:
    image: minio/mc:RELEASE.2024-07-15T17-46-06Z
    container_name: netpack-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/scripts/create-buckets.sh"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-netpack}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-netpack_dev_password}
      MINIO_EVIDENCE_BUCKET: ${MINIO_EVIDENCE_BUCKET:-evidence}
      MINIO_EXPORTS_BUCKET: ${MINIO_EXPORTS_BUCKET:-exports}
    volumes:
      - ./minio/create-buckets.sh:/scripts/create-buckets.sh:ro
    networks:
      - netpack

  kafka:
    image: bitnamilegacy/kafka:3.7
    container_name: netpack-kafka
    restart: unless-stopped
    profiles:
      - streaming
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:${KAFKA_PORT:-9092}
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR: 1
    ports:
      - "127.0.0.1:${KAFKA_PORT:-9092}:9094"
    volumes:
      - kafka_data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - netpack

  kafka-init:
    image: bitnamilegacy/kafka:3.7
    container_name: netpack-kafka-init
    profiles:
      - streaming
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - /bin/sh
      - -c
      - |
        kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic raw-capture-chunks --partitions 3 --replication-factor 1
        kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic parser-jobs --partitions 3 --replication-factor 1
        kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic parsed-flows --partitions 3 --replication-factor 1
        kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic alerts --partitions 3 --replication-factor 1
    networks:
      - netpack

volumes:
  postgres_data:
  elasticsearch_data:
  minio_data:
  kafka_data:

networks:
  netpack:
    name: netpack
